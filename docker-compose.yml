services:
  db:
    image: mysql:8
    container_name: bistrot_db
    environment:
      MYSQL_DATABASE: bistrot
      MYSQL_USER: bistrot
      MYSQL_PASSWORD: bistrot123
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: bistrot_backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:22-alpine
    container_name: bistrot_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  db_data: